name: Klamdo — AI Content Engine for Creators and Agents
description: |
  Generate identity-locked 4K images and 5-second vertical videos from a single
  reference photo — or connect your AI agent and generate full content packages:
  scripts, captions, images, video, voiceover, ebook outlines, slide decks, and
  landing page copy, all returned as a typed manifest your agent can act on.

  Tools: generate_image, generate_video, upload_start_frame, check_job,
  get_account, list_jobs, list_packages, create_package, get_package,
  get_package_manifest

  Requires a Klamdo API key — get yours at https://klamdo.app/profile

version: "1.4.4"
homepage: https://klamdo.app
documentationUrl: https://github.com/klamdo-app/klamdo-mcp
iconUrl: https://klamdo.app/favicon.ico

configSchema:
  type: object
  properties:
    apiKey:
      type: string
      title: Klamdo API Key
      description: >
        Your Klamdo API key. Sign up free at https://klamdo.app and copy
        your key from the Profile page (https://klamdo.app/profile).
  required:
    - apiKey

startCommand:
  type: http
  url: https://mcp.klamdo.app/mcp
  headers:
    Authorization: "Bearer {{config.apiKey}}"
